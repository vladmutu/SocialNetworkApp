services:
  postgres:
    image: postgres:16-alpine
    container_name: socialnetwork-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: socialnetwork
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - socialnetwork_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d socialnetwork"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  socialnetwork_pgdata:

